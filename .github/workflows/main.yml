name: Build and Push to Docker Hub

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # This gives the "GITHUB_TOKEN" permission to write the image to your repo
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./Dairy
          push: true
          # The name will be: ghcr.io/your-github-username/dairy-app:latest
          tags: ghcr.io/${{ collections.toLower(github.repository_owner) }}/dairy-app:latest