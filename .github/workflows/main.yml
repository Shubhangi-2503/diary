name: Build and Push to Docker Hub

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.shubhangit0130 }}
          password: ${{ secrets.dckr_pat_7fm1mk3V0MZfnjne2mKuDQkWgos}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./Diary
          push: true
          # This tags the image with your username and 'latest'
          tags: ${{ secrets.shubhangit0130 }}/diary-app:latest
